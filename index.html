<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Atif Lodhi — Delivery Playbook</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --ink: #0d0f14;
    --paper: #f7f5f0;
    --accent: #c8a96e;
    --accent-light: #f0e8d8;
    --muted: #6b6b6b;
    --rule: #d8d4cc;
    --white: #ffffff;
    --blue: #1e3a8a;
    --blue-mid: #2563eb;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--paper);
    color: var(--ink);
    line-height: 1.65;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 9999;
    opacity: 0.5;
  }

  header {
    background: var(--ink);
    color: var(--white);
    padding: 80px 40px 60px;
    position: relative;
    overflow: hidden;
  }

  header::after {
    content: 'PM/TPM';
    position: absolute;
    right: -20px;
    bottom: -30px;
    font-family: 'Playfair Display', serif;
    font-size: 160px;
    font-weight: 900;
    color: rgba(255,255,255,0.03);
    line-height: 1;
    pointer-events: none;
    white-space: nowrap;
  }

  .header-inner {
    max-width: 1100px;
    margin: auto;
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: end;
    gap: 20px;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    font-weight: 500;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(36px, 6vw, 64px);
    font-weight: 900;
    line-height: 1.1;
    letter-spacing: -0.02em;
  }

  header h1 span {
    color: var(--accent);
  }

  .header-sub {
    margin-top: 14px;
    font-size: 14px;
    color: #9ca3af;
    max-width: 480px;
    line-height: 1.7;
  }

  .header-meta {
    text-align: right;
  }

  .linkedin-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    background: transparent;
    border: 1px solid rgba(255,255,255,0.2);
    color: white;
    text-decoration: none;
    font-size: 12px;
    letter-spacing: 0.05em;
    border-radius: 4px;
    transition: all 0.2s;
    font-family: 'DM Sans', sans-serif;
  }

  .linkedin-btn:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  nav {
    background: var(--white);
    border-bottom: 1px solid var(--rule);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .nav-inner {
    max-width: 1100px;
    margin: auto;
    display: flex;
  }

  .nav-inner a {
    padding: 14px 20px;
    text-decoration: none;
    font-size: 12px;
    text-transform: uppercase;
    color: var(--muted);
  }

  .container {
    max-width: 1100px;
    margin: auto;
    padding: 50px 20px 80px;
  }

  .artifact-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 14px;
  }

  .artifact-card {
    background: var(--white);
    border: 1px solid var(--rule);
    border-radius: 8px;
    padding: 22px;
  }

  .artifact-title {
    font-size: 17px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .artifact-footer {
    margin-top: 16px;
    display: flex;
    justify-content: flex-end;
  }

  .dl-btn {
    padding: 8px 14px;
    background: var(--ink);
    color: var(--white);
    text-decoration: none;
    font-size: 11px;
    border-radius: 4px;
  }
</style>
</head>

<body>

<header>
  <div class="header-inner">
    <div>
      <div class="eyebrow">Delivery Playbook</div>
      <h1>Enterprise <span>Transformation</span> Toolkit</h1>
    </div>
    <div class="header-meta">
      <a class="linkedin-btn" href="https://www.linkedin.com/in/atiflodhi/" target="_blank">
        Atif Lodhi
      </a>
    </div>
  </div>
</header>

<nav>
  <div class="nav-inner">
    <a href=\"#summary\">Summary</a>
    <a href=\"#artifacts\">Artifacts</a>
  </div>
</nav>

<div class=\"container\">

<section id=\"artifacts\">
<h2>Artifacts</h2>

<div class=\"artifact-grid\">

<div class=\"artifact-card\">
<div class=\"artifact-title\">Business Requirements Document</div>
<div class=\"artifact-footer\">
<a class=\"dl-btn\" href=\"#\">Download BRD</a>
</div>
</div>

<div class=\"artifact-card\">
<div class=\"artifact-title\">Product Requirements Document</div>
<div class=\"artifact-footer\">
<a class=\"dl-btn\" href=\"#\">Download PRD</a>
</div>
</div>

<div class=\"artifact-card\">
<div class=\"artifact-title\">System Requirements Specification</div>
<div class=\"artifact-footer\">
<a class=\"dl-btn\" href=\"#\">Download SRS</a>
</div>
</div>

<div class=\"artifact-card\">
<div class=\"artifact-title\">RAID Log</div>
<div class=\"artifact-footer\">
<a class=\"dl-btn\" href=\"#\">Download RAID</a>
</div>
</div>

</div>
</section>

</div>

</body>
</html>
